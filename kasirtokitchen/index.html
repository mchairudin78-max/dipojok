<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DiPojok">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="/icon-kasir.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiPojok Kitchen System</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#0a0a0a;
    font-family:'Montserrat',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .logo{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:6px;color:#fff;margin-bottom:4px;}
  .logo span{color:#25d366;}
  .sub{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.4);margin-bottom:48px;text-transform:uppercase;}
  .cards{display:flex;flex-direction:column;gap:16px;width:100%;max-width:360px;}
  .card{
    display:block;
    text-decoration:none;
    border-radius:12px;
    padding:24px 28px;
    cursor:pointer;
    transition:transform .15s, box-shadow .15s;
    position:relative;
    overflow:hidden;
  }
  .card:active{transform:scale(.97);}
  .card-kasir{
    background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);
    border:2px solid rgba(59,130,246,.4);
    box-shadow:0 4px 24px rgba(59,130,246,.15);
  }
  .card-kasir:hover{box-shadow:0 8px 32px rgba(59,130,246,.35);transform:translateY(-2px);}
  .card-kitchen{
    background:linear-gradient(135deg,#1a2e1a 0%,#0d1f0d 100%);
    border:2px solid rgba(37,211,102,.4);
    box-shadow:0 4px 24px rgba(37,211,102,.15);
  }
  .card-kitchen:hover{box-shadow:0 8px 32px rgba(37,211,102,.35);transform:translateY(-2px);}
  .card-icon{font-size:36px;margin-bottom:10px;}
  .card-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:#fff;margin-bottom:4px;}
  .card-kasir .card-title{color:#93c5fd;}
  .card-kitchen .card-title{color:#86efac;}
  .card-desc{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:.5px;}
  .card-arrow{position:absolute;right:24px;top:50%;transform:translateY(-50%);font-size:22px;opacity:.4;}
  .footer{margin-top:40px;font-size:10px;color:rgba(255,255,255,.2);letter-spacing:2px;text-align:center;}
</style>
</head>
<body>
  <div class="logo">DI<span>POJOK</span></div>
  <div class="sub">Kitchen Management System</div>

  <div class="cards">
    <a class="card card-kasir" href="kasir-input.html">
      <div class="card-icon">🧾</div>
      <div class="card-title">KASIR</div>
      <div class="card-desc">Input pesanan & kelola order</div>
      <div class="card-arrow">→</div>
    </a>
    <a class="card card-kitchen" href="kitchen.html">
      <div class="card-icon">🍳</div>
      <div class="card-title">DAPUR</div>
      <div class="card-desc">Monitor & sajikan pesanan</div>
      <div class="card-arrow">→</div>
    </a>
  </div>

  <div class="footer">© DIPOJOK · ALL RIGHTS RESERVED</div>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('/sw.js').catch(function(){});
  });
}
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
</script>
</body>
</html>
